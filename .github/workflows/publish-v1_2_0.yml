name: Publish v1.2.0

# One-shot publisher: triggers on push of this file to the dev branch and creates
# the v1.2.0 GitHub Release (and tag) on main using GITHUB_TOKEN. Needed because
# this environment cannot push tags (git proxy) or dispatch workflows (token lacks
# actions:write). The generic release.yml on main remains the standard path.
on:
  push:
    branches:
      - claude/prvio-earth-master-build-t2cw9c
    paths:
      - .github/workflows/publish-v1_2_0.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract v1.2.0 notes from CHANGELOG
        run: |
          awk '/^## \[1\.2\.0\]/{f=1; next} /^## \[/{if(f) exit} f' CHANGELOG.md > notes.md
          echo "----- notes -----"; cat notes.md
      - name: Create release v1.2.0 on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.2.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v1.2.0 already exists — nothing to do."
            exit 0
          fi
          gh release create v1.2.0 \
            --repo "$GITHUB_REPOSITORY" \
            --title "PRVIO Earth v1.2.0" \
            --notes-file notes.md \
            --target main

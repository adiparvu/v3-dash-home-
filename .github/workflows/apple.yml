name: Apple

# Builds the native Apple client on a macOS runner so Swift compilation is
# validated in CI (the Linux `ci.yml` can't build Xcode projects). Runs only when
# the Apple sources change. TestFlight upload lives in `testflight.yml`.
#
# The app targets iOS/watchOS 26 + Swift 6 and builds with Xcode 26
# (`latest-stable`). iOS 27 SDK is not yet available on hosted runners.
on:
  push:
    branches: ["**"]
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  pull_request:
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apple
        run: |
          cp PRVIOEarth/Resources/Config.xcconfig.example PRVIOEarth/Resources/Config.xcconfig
          xcodegen generate
      - name: Build iPhone/iPad app + widgets (no signing)
        working-directory: apple
        run: |
          set -o pipefail
          xcodebuild build \
            -project PRVIOEarth.xcodeproj \
            -scheme PRVIOEarth \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Build Apple Watch app (no signing)
        working-directory: apple
        run: |
          set -o pipefail
          xcodebuild build \
            -project PRVIOEarth.xcodeproj \
            -scheme PRVIOEarthWatch \
            -destination 'generic/platform=watchOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO


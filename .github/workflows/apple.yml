name: Apple

# Builds the native Apple client on a macOS runner so Swift compilation is
# validated in CI (the Linux `ci.yml` can't build Xcode projects). Runs only when
# the Apple sources change. A separate, manual TestFlight job archives & uploads.
#
# NOTE: the app targets iOS/watchOS 27 + Swift 6 and requires Xcode 27. The
# `latest` selector picks the newest Xcode on the runner image (including
# pre-release). If the hosted image does not yet ship Xcode 27, use a self-hosted
# runner or pin `xcode-version` to an installed 27.x.
on:
  push:
    branches: ["**"]
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  pull_request:
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  workflow_dispatch:
    inputs:
      testflight:
        description: "Also archive and upload to TestFlight (requires secrets)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apple
        run: |
          cp PRVIOEarth/Resources/Config.xcconfig.example PRVIOEarth/Resources/Config.xcconfig
          xcodegen generate
      - name: Build iPhone/iPad app + widgets (no signing)
        working-directory: apple
        run: |
          set -o pipefail
          xcodebuild build \
            -project PRVIOEarth.xcodeproj \
            -scheme PRVIOEarth \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Build Apple Watch app (no signing)
        working-directory: apple
        run: |
          set -o pipefail
          xcodebuild build \
            -project PRVIOEarth.xcodeproj \
            -scheme PRVIOEarthWatch \
            -destination 'generic/platform=watchOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  testflight:
    # Manual only. Requires App Store Connect API key + signing secrets:
    #   ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_P8 (the .p8 contents).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.testflight }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apple
        run: |
          cp PRVIOEarth/Resources/Config.xcconfig.example PRVIOEarth/Resources/Config.xcconfig
          xcodegen generate
      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$ASC_API_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
      - name: Archive
        working-directory: apple
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PRVIOEarth.xcodeproj \
            -scheme PRVIOEarth \
            -destination 'generic/platform=iOS' \
            -archivePath build/PRVIOEarth.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
      - name: Export & upload to TestFlight
        working-directory: apple
        run: |
          set -o pipefail
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/PRVIOEarth.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

name: Release

# Generic, reusable release pipeline.
#   - Push a tag like `v1.2.0`  → publishes a GitHub Release for that tag.
#   - Or run manually (workflow_dispatch) with a version input.
# The version is derived from the tag, and the release notes are extracted from
# the matching `## [x.y.z]` section of CHANGELOG.md. Uses the built-in
# GITHUB_TOKEN — no secrets required.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, e.g. v1.2.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "number=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          HEADER="## [${{ steps.ver.outputs.number }}]"
          awk -v h="$HEADER" 'index($0,h)==1 {flag=1; next} /^## \[/{if(flag) exit} flag' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release ${{ steps.ver.outputs.tag }}." > notes.md
          fi
          echo "----- release notes -----"
          cat notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "PRVIO Earth $TAG" \
            --notes-file notes.md \
            --target "$GITHUB_SHA"

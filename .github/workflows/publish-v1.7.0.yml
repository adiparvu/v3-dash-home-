name: Publish v1.7.0

# One-shot publisher: pushing this file self-triggers the run, which cuts the
# v1.7.0 GitHub Release (tag created at this commit) with notes extracted from
# CHANGELOG.md. Uses the built-in GITHUB_TOKEN. Deleted right after it runs.
on:
  push:
    branches:
      - claude/prvio-earth-master-build-t2cw9c
    paths:
      - .github/workflows/publish-v1.7.0.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release v1.7.0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=v1.7.0
          NUM=1.7.0
          HEADER="## [$NUM]"
          awk -v h="$HEADER" 'index($0,h)==1 {flag=1; next} /^## \[/{if(flag) exit} flag' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release $TAG." > notes.md
          echo "----- notes -----"; cat notes.md
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."; exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "PRVIO Earth $TAG" \
            --notes-file notes.md \
            --target "$GITHUB_SHA"

name: TestFlight

# Archives the iOS app and uploads it to TestFlight using App Store Connect API
# key authentication + automatic ("cloud") signing. Everything sensitive comes
# from repository secrets — nothing is stored in the repo:
#   ASC_API_KEY_P8  — contents of the App Store Connect API .p8 key (Admin role)
#   ASC_KEY_ID      — the key's Key ID
#   ASC_ISSUER_ID   — the App Store Connect API Issuer ID
#   APPLE_TEAM_ID   — the 10-character Apple Developer Team ID
#
# Trigger it either from the Actions tab ("Run workflow") or by changing the
# marker file `.github/trigger-testflight` and pushing.
#
# Prerequisites (one-time, in Apple's portals): an active Apple Developer Program
# membership, the app record created in App Store Connect for bundle id
# Prv.prvio.app, and the App Group / Push / WeatherKit capabilities enabled on
# the App ID. Automatic signing (-allowProvisioningUpdates) registers the
# provisioning profiles using the API key.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/prvio-earth-master-build-t2cw9c
    paths:
      - .github/trigger-testflight

permissions:
  contents: read

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify required secrets are set
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for v in ASC_API_KEY_P8 ASC_KEY_ID ASC_ISSUER_ID APPLE_TEAM_ID; do
            if [ -z "${!v}" ]; then echo "::error::Missing repository secret: $v"; missing=1; fi
          done
          if [ "$missing" != "0" ]; then
            echo "Add them in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apple
        run: |
          cp PRVIOEarth/Resources/Config.xcconfig.example PRVIOEarth/Resources/Config.xcconfig
          xcodegen generate

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s\n' "$ASC_API_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Diagnostic — list apps visible to this API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Mints a short-lived ES256 JWT from the API key (the key never leaves
          # the runner and is never printed) and asks App Store Connect which apps
          # this key can see. This reveals the EXACT bundle id(s) registered, so
          # PRODUCT_BUNDLE_IDENTIFIER can be matched without guessing. Diagnostic
          # only: never fails the build.
          set +e
          KEY="$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          now=$(date +%s); exp=$((now + 600))
          header=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$ASC_KEY_ID" | b64url)
          payload=$(printf '{"iss":"%s","iat":%s,"exp":%s,"aud":"appstoreconnect-v1"}' "$ASC_ISSUER_ID" "$now" "$exp" | b64url)
          sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign "$KEY" -binary | b64url)
          jwt="$header.$payload.$sig"
          echo "=== Apps visible to API key (name — bundleId) ==="
          resp=$(curl -s -H "Authorization: Bearer $jwt" \
            "https://api.appstoreconnect.apple.com/v1/apps?limit=200&fields[apps]=name,bundleId")
          # Print name + bundleId pairs without needing jq.
          echo "$resp" | python3 -c 'import sys,json
try:
    d=json.load(sys.stdin)
except Exception as e:
    print("could not parse response:", e); sys.exit(0)
apps=d.get("data",[])
if not apps:
    print("(no apps returned — this key/team has 0 apps, or insufficient role)")
    print("raw:", json.dumps(d)[:1500])
for a in apps:
    at=a.get("attributes",{})
    print(f" - {at.get(\"name\")!r}  bundleId={at.get(\"bundleId\")!r}  id={a.get(\"id\")}")'
          echo "=== end app list ==="
          set -e

      - name: Archive (unsigned — distribution signing happens at export)
        working-directory: apple
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          [ -n "$VERSION" ] || VERSION=1.0.0
          echo "Building version $VERSION (build $GITHUB_RUN_NUMBER)"
          # Archive without code signing. Signing for App Store distribution is
          # done in the export step via the App Store Connect API key, which
          # generates an "Apple Distribution" profile that needs no registered
          # devices (unlike the iOS App Development profile that automatic signing
          # would otherwise request during archive).
          xcodebuild archive \
            -project PRVIOEarth.xcodeproj \
            -scheme PRVIOEarth \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/PRVIOEarth.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"

      - name: Export & upload to TestFlight
        working-directory: apple
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PRVIOEarth.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Dump distribution logs on failure
        if: failure()
        run: |
          echo "=== Searching for .xcdistributionlogs ==="
          # xcodebuild writes the detailed export/upload error (the underlying
          # NSError / HTTP status from App Store Connect) into a distribution log
          # bundle that the normal console output doesn't include.
          for d in $(find "$TMPDIR" /var/folders "$RUNNER_TEMP" -name '*.xcdistributionlogs' -type d 2>/dev/null); do
            echo "----- $d -----"
            find "$d" -name 'IDEDistribution*.log' -print -exec sh -c 'echo "===== $1 ====="; cat "$1"' _ {} \; 2>/dev/null
          done
          echo "=== end distribution logs ==="

# PRVIO Earth — Apple client (XcodeGen spec)
#
# Generate the Xcode project on a Mac with:
#   brew install xcodegen
#   cd apple && xcodegen generate && open PRVIOEarth.xcodeproj
#
# Phase 8: multiplatform PRVIO Earth client. Targets the latest SDKs
# (iOS/iPadOS/visionOS 27, watchOS 27) and Swift 6, using the native SwiftUI
# Liquid Glass APIs. Requires Xcode 27.
#   - PRVIOEarth        — iPhone + iPad + Mac (Catalyst) + Vision Pro (one target)
#   - PRVIOEarthWidgets — WidgetKit + Live Activities extension
#   - PRVIOEarthWatch   — Apple Watch app
# All share the code under Shared/ (and reuse the design system).
name: PRVIOEarth
options:
  bundleIdPrefix: earth.prvio
  deploymentTarget:
    iOS: "27.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set your Apple Developer Team ID
    ENABLE_USER_SCRIPT_SANDBOXING: YES

configFiles:
  Debug: PRVIOEarth/Resources/Config.xcconfig
  Release: PRVIOEarth/Resources/Config.xcconfig

targets:
  PRVIOEarth:
    type: application
    platform: iOS
    sources:
      - path: PRVIOEarth
      - path: Shared
      - path: Connectivity # WatchConnectivity bridge (app + watch only)
    dependencies:
      - target: PRVIOEarthWidgets
    info:
      path: PRVIOEarth/Resources/Info.plist
      properties:
        CFBundleDisplayName: PRVIO Earth
        UILaunchScreen: {}
        NSFaceIDUsageDescription: >-
          PRVIO Earth uses Face ID to unlock your private estate data on this device.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - remote-notification
        # OAuth / magic-link deep-link callback (prvio://auth-callback).
        CFBundleURLTypes:
          - CFBundleURLName: earth.prvio.app.auth
            CFBundleURLSchemes:
              - prvio
        # Injected from Config.xcconfig so secrets stay out of source control.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        API_BASE_URL: $(API_BASE_URL)
    entitlements:
      path: PRVIOEarth/Resources/PRVIOEarth.entitlements
      properties:
        com.apple.security.application-groups:
          - group.earth.prvio.app
        aps-environment: development # APNs for push-updated Live Activities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: earth.prvio.app
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        # Multiplatform: same SwiftUI code on Mac (Catalyst) and Vision Pro.
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: YES

  PRVIOEarthWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PRVIOEarthWidgets
      - path: Shared
      - path: PRVIOEarth/DesignSystem/Theme.swift # reuse the palette
    info:
      path: PRVIOEarthWidgets/Info.plist
      properties:
        CFBundleDisplayName: PRVIO Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: PRVIOEarthWidgets/PRVIOEarthWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.earth.prvio.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: earth.prvio.app.widgets
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"

  PRVIOEarthWatch:
    type: application
    platform: watchOS
    deploymentTarget: "27.0"
    sources:
      - path: PRVIOEarthWatch
      - path: Shared
      - path: Connectivity # WatchConnectivity bridge
      - path: PRVIOEarth/DesignSystem/Theme.swift # reuse the palette
    info:
      path: PRVIOEarthWatch/Info.plist
      properties:
        CFBundleDisplayName: PRVIO
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: earth.prvio.app.watchkitapp
        GENERATE_INFOPLIST_FILE: NO

# PRVIO Earth — Apple client (XcodeGen spec)
#
# Generate the Xcode project on a Mac with:
#   brew install xcodegen
#   cd apple && xcodegen generate && open PRVIOEarth.xcodeproj
#
# Phase 8, increment 1: iPhone SwiftUI app foundation. Widgets, Live
# Activities, Watch / iPad / Mac / Vision targets are added in later increments.
name: PRVIOEarth
options:
  bundleIdPrefix: earth.prvio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set your Apple Developer Team ID
    ENABLE_USER_SCRIPT_SANDBOXING: YES

configFiles:
  Debug: PRVIOEarth/Resources/Config.xcconfig
  Release: PRVIOEarth/Resources/Config.xcconfig

targets:
  PRVIOEarth:
    type: application
    platform: iOS
    sources:
      - path: PRVIOEarth
    info:
      path: PRVIOEarth/Resources/Info.plist
      properties:
        CFBundleDisplayName: PRVIO Earth
        UILaunchScreen: {}
        NSFaceIDUsageDescription: >-
          PRVIO Earth uses Face ID to unlock your private estate data on this device.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Injected from Config.xcconfig so secrets stay out of source control.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        API_BASE_URL: $(API_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: earth.prvio.app
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
